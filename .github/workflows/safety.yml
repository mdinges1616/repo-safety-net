name: Repo Safety Checks

on: push

jobs:
  safety:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v5

      - name: Block <script> tags
        run: |
          echo "Checking these HTML files:"
          find . -name "*.html" -not -path "./.git/*" -print
          echo ""
          MATCHES=$(grep -rn "<script" --include="*.html" . || true)
          if [ -n "$MATCHES" ]; then
            echo "Detected <script> tags:"
            echo "$MATCHES"
            echo "::error title=Script tag detected::Found one or more <script> tags. See log for line numbers."
            exit 1
          fi
          echo "OK: no <script> tags found in HTML files."
