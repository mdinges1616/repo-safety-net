name: Repo Safety Checks

on: push

jobs:
  safety:
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v5

      - name: Block disallowed <script> usage
        run: |
          echo "Checking these HTML files:"
          find . -name "*.html" -not -path "./.git/*" -print
          echo ""
          SUSPICIOUS=$(grep -rEn "<script" --include="*.html" . | grep -vE '<script src="[a-zA-Z0-9_.-][a-zA-Z0-9_./-]*"></script>' || true)
          if [ -n "$SUSPICIOUS" ]; then
            echo "Detected disallowed <script> usage:"
            echo "$SUSPICIOUS"
            echo "::error title=Disallowed script::Use the safe pattern <script src=\"local-file.js\"></script> (no inline JS, no URLs)."
            exit 1
          fi
          echo "OK: only safe <script src> usage detected."
